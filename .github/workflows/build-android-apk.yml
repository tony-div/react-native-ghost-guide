name: Build Android APK

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: 'r25c'
          add-to-path: false

      - name: Install root dependencies
        run: npm install

      - name: Generate native code and compile TypeScript
        run: |
          npm run specs
          npm run typescript

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Android Rust libraries
        run: |
          if [ -f build_rust.sh ]; then
            chmod +x build_rust.sh
            ./build_rust.sh
          elif [ -f Cargo.toml ]; then
            cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 -o cpp/libs build --release
          else
            echo "No Rust build script or Cargo.toml found, skipping Rust build"
          fi
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Install example dependencies
        run: cd example && npm install

      - name: Build Android release APK
        run: cd example/android && chmod +x gradlew && ./gradlew assembleRelease
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Rename APK
        run: |
          APK_PATH="example/android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "ghost-guide-example-${{ github.ref_name }}.apk"
          else
            echo "APK not found at $APK_PATH"
            find example/android/app/build/outputs/apk -name "*.apk"
            exit 1
          fi

      - name: Upload APK to Release
        if: github.event_name == 'release'
        run: gh release upload ${{ github.ref_name }} ghost-guide-example-${{ github.ref_name }}.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as Artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ghost-guide-example-${{ github.ref_name }}.apk
          path: ghost-guide-example-${{ github.ref_name }}.apk
